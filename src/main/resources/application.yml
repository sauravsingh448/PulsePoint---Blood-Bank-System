server:
  port: ${PORT:8080}

spring:
  datasource:
   url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # auto create/update tables, use cautiously in prod
    show-sql: true       # logs SQL queries in console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  application:
    name: bloodbank-project


  mail:
    host: smtp.gmail.com
    port: 587
   username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true








